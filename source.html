<!doctype html>
<html lang="vn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nuke DashBoard</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/home.css" />
    <style>
      .heading {
        color: var(--neon-cyan);
      }
      .sc {
        margin: 0 auto;
      }
      .box {
        padding: 20px;
        height: auto;
        margin-left: 20px;
      }
      pre {
        margin-top: 20px;
        display: block;
        line-height: 1.6;
        font-size: 20px;
        font-weight: bold;
        color: var(--neon-cyan);
        background: #131b27;
        padding: 10px 14px;
        border-radius: 10px;
        width: fit-content;
      }
      .blockbtn {
        width: fit-content;
        margin: 0 auto;
        margin-top: 10px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        cursor: pointer;
      }
      .btnFunc {
        font-size: 12px;
        width: 200px;
        background: white;
        font-weight: bold;
        border: rgb(180, 217, 255) 5px solid;
        border-radius: 20px;
      }
      #warn {
        height: 50px;
        width: fit-content;
        background-color: #f2f8ff;
        color: red;
        font-size: 16px;
        font-weight: bold;
        margin: 10px auto;
        padding: 10px;
      }
      .copy-btn {
        margin-top: 10px;
        padding: 10px;
        font-size: 16px;
        background: #a0ffa3;
        border-radius: 20px;
        border: rgb(180, 217, 255) 5px solid;
      }
      .copy-btn:hover {
        background: #edffed;
        border: rgb(255, 180, 180) 5px solid;
        transition: all 0.3s ease;
      }
      .download-btn {
        margin-top: 10px;
        margin-left: 10px;
        padding: 10px;
        font-size: 16px;
        background: #a0ffa3;
        border-radius: 20px;
        border: rgb(180, 217, 255) 5px solid;
      }
      .download-btn:hover {
        background: #edffed;
        border: rgb(255, 180, 180) 5px solid;
        transition: all 0.3s ease;
      }
      @media (max-width: 1024px) {
        .box {
          margin: 40px auto;
          margin-left: 100px;
          width: fit-content;
        }
        pre {
          font-size: 14px;
        }
      }
      @media (max-width: 736px) {
        .box {
          max-width: fit-content;
          margin-left: 120px;
        }
        pre {
          font-size: 12px;
        }
      }
      @media (min-width: 1080px) {
        .box {
          width: fit-content !important;
          max-width: none !important;
        }
      }
    </style>
  </head>
  <body>
    <h1 class="head">NUKE DASHBOARD</h1>
    <div class="menu">
      <ul>
        <li><a href="home.html">Trang chủ</a></li>
        <li>
          <a href="source.html" style="background-color: #005229">Code test</a>
        </li>
        <li><a href="cambien.html">Bảng điều khiển</a></li>
        <li><a id="logout">Đăng xuất</a></li>
      </ul>
    </div>
    <div class="supercontainer">
      <div class="blockbtn">
        <button class="btnFunc" id="bme280">Source BME280</button>
        <button class="btnFunc" id="dht11">Source DHT11</button>
        <button class="btnFunc" id="control">Source Control</button>
        <button class="btnFunc" id="button">Source Button</button>
        <button class="btnFunc" id="timecontrol">Source Time Control</button>
        <button class="btnFunc" id="userbuild">Source User Build</button>
        <button class="btnFunc" id="servocontrol">Source Servo Control</button>
      </div>
      <div class="sc container">
        <h1 id="warn">
          *Lưu ý: Source code ở dưới dành riêng cho board do Nuke DashBoard phát
          triển. <br />Nếu bạn sử dụng board của bạn để test thì vui lòng sửa
          code cấu hình theo board của bạn.
        </h1>
      </div>
    </div>
    <script>
      document.getElementById("logout").onclick = function () {
        let text = "Bạn có muốn đăng xuất ?";
        if (confirm(text) == true) {
          localStorage.removeItem("cards");
          let user = localStorage.getItem("username");
          user = "";
          localStorage.setItem("username", user);
          window.location.href = "index.html";
        } else {
          return;
        }
      };
    </script>
    <script type="module" src="js/source.js"></script>
    <script type="module" src="js/home.js"></script>
  </body>
</html>
